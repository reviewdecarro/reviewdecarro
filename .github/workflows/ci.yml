name: CI

on:
  pull_request:
    branches: [staging]

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reviewdecarro
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reviewdecarro?schema=public
      PYTHON: /usr/bin/python3
      NODE_ENV: test
      API_PORT: "3000"
      WHITELIST_REQUESTS: http://localhost:3001
      JWT_SECRET: ci-test-jwt-secret
      WEB_EMAIL_CONFIRMATION_BASE_URL: http://localhost:3001
      WEB_FORGOT_PASSWORD_URL: http://localhost:3001/forgot-password
      RESEND_MAIL_KEY: ci-test-resend-key
      MAIL_SENDER_EMAIL: ci@reviewdecarro.com
      MAIL_SENDER_NAME: ReviewDeCarro CI
      SEED_ADMIN_EMAIL: admin@reviewdecarro.com
      SEED_ADMIN_PASSWORD: Admin123456!
      WEB_APP_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3
          npm install -g node-gyp

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm dlx prisma generate
        working-directory: apps/api

      - name: Run migrations
        run: pnpm dlx prisma migrate deploy
        working-directory: apps/api

      - name: Seed database
        run: pnpm seed
        working-directory: apps/api

      - name: Lint
        run: pnpm turbo lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        working-directory: apps/api
